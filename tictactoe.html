<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tic Tac Toe</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #0f0f1a;
      font-family: 'Segoe UI', sans-serif;
      color: #e0e0f0;
    }

    h1 {
      font-size: 2rem;
      letter-spacing: 0.15em;
      margin-bottom: 1.5rem;
      color: #c9b8ff;
    }

    #status {
      font-size: 1.1rem;
      margin-bottom: 1.2rem;
      min-height: 1.5em;
      color: #a0a0c0;
    }

    #board {
      display: grid;
      grid-template-columns: repeat(3, 110px);
      grid-template-rows: repeat(3, 110px);
      gap: 10px;
    }

    .cell {
      background: #1c1c30;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3rem;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      user-select: none;
    }

    .cell:hover:not(.taken) {
      background: #2a2a45;
      transform: scale(1.04);
    }

    .cell.x { color: #7eb8ff; }
    .cell.o { color: #ff8fa3; }

    .cell.win {
      background: #2e2a50;
      outline: 2px solid #c9b8ff;
    }

    #restart {
      margin-top: 1.5rem;
      padding: 0.6rem 1.8rem;
      font-size: 1rem;
      background: #3a2f6e;
      color: #e0d8ff;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      letter-spacing: 0.05em;
      transition: background 0.15s;
    }

    #restart:hover { background: #4e3f8f; }

    #score {
      display: flex;
      gap: 2rem;
      margin-bottom: 1.4rem;
      font-size: 0.95rem;
      color: #8080a0;
    }

    #score span { font-weight: bold; }
    .score-x span { color: #7eb8ff; }
    .score-o span { color: #ff8fa3; }
    .score-tie span { color: #a0a0c0; }
  </style>
</head>
<body>
  <h1>TIC TAC TOE</h1>
  <div id="score">
    <div class="score-x">X wins: <span id="xw">0</span></div>
    <div class="score-tie">Ties: <span id="tw">0</span></div>
    <div class="score-o">O wins: <span id="ow">0</span></div>
  </div>
  <div id="status">X's turn</div>
  <div id="board">
    <div class="cell" data-i="0"></div>
    <div class="cell" data-i="1"></div>
    <div class="cell" data-i="2"></div>
    <div class="cell" data-i="3"></div>
    <div class="cell" data-i="4"></div>
    <div class="cell" data-i="5"></div>
    <div class="cell" data-i="6"></div>
    <div class="cell" data-i="7"></div>
    <div class="cell" data-i="8"></div>
  </div>
  <button id="restart">Restart</button>

  <script>
    const WINS = [
      [0,1,2],[3,4,5],[6,7,8],
      [0,3,6],[1,4,7],[2,5,8],
      [0,4,8],[2,4,6]
    ];

    let board, current, over;
    const score = { X: 0, O: 0, T: 0 };

    const cells = document.querySelectorAll('.cell');
    const status = document.getElementById('status');

    function init() {
      board = Array(9).fill(null);
      current = 'X';
      over = false;
      cells.forEach(c => {
        c.textContent = '';
        c.className = 'cell';
      });
      status.textContent = "X's turn";
    }

    function checkWin() {
      for (const [a,b,c] of WINS) {
        if (board[a] && board[a] === board[b] && board[a] === board[c]) {
          return [a, b, c];
        }
      }
      return null;
    }

    cells.forEach(cell => {
      cell.addEventListener('click', () => {
        const i = +cell.dataset.i;
        if (over || board[i]) return;

        board[i] = current;
        cell.textContent = current;
        cell.classList.add('taken', current.toLowerCase());

        const win = checkWin();
        if (win) {
          win.forEach(idx => cells[idx].classList.add('win'));
          status.textContent = `${current} wins!`;
          score[current]++;
          updateScore();
          over = true;
        } else if (board.every(v => v)) {
          status.textContent = "It's a tie!";
          score.T++;
          updateScore();
          over = true;
        } else {
          current = current === 'X' ? 'O' : 'X';
          status.textContent = `${current}'s turn`;
        }
      });
    });

    function updateScore() {
      document.getElementById('xw').textContent = score.X;
      document.getElementById('ow').textContent = score.O;
      document.getElementById('tw').textContent = score.T;
    }

    document.getElementById('restart').addEventListener('click', init);

    init();
  </script>
</body>
</html>
